server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://backend:3001/uploads/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
